<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shutter-metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#ffffff" />
      <stop offset="35%" stopColor="#e2e8f0" />
      <stop offset="70%" stopColor="#94a3b8" />
      <stop offset="100%" stopColor="#475569" />
    </linearGradient>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#818cf8" />
      <stop offset="100%" stopColor="#4f46e5" />
    </linearGradient>
  </defs>
  <!-- Mirror the background shutter elements to match the main app logo -->
  <g transform="scale(-1, 1) translate(-100, 0)">
    <!-- High-contrast vibrant glowing border and background -->
    <circle cx="50" cy="50" r="48" fill="url(#bg-gradient)" stroke="#ffffff" strokeWidth="2.5" />
    <g stroke="#312e81" strokeWidth="1.5" strokeLinejoin="round">
      <path id="blade" d="M 98,50 A 48 48 0 0 1 83.94,83.94 L 50,72 A 22 22 0 0 0 65.56,65.56 Z" fill="url(#shutter-metal)" />
      <use href="#blade" transform="rotate(45 50 50)" />
      <use href="#blade" transform="rotate(90 50 50)" />
      <use href="#blade" transform="rotate(135 50 50)" />
      <use href="#blade" transform="rotate(180 50 50)" />
      <use href="#blade" transform="rotate(225 50 50)" />
      <use href="#blade" transform="rotate(270 50 50)" />
      <use href="#blade" transform="rotate(315 50 50)" />
    </g>
    <!-- Central black aperture lens -->
    <circle cx="50" cy="50" r="22" fill="#09090b" stroke="#ffffff" strokeWidth="1.5" />
  </g>
  <!-- Keep the letter 'V' unmirrored for legibility -->
  <text
    x="50"
    y="58"
    fontFamily="system-ui, -apple-system, sans-serif"
    fontWeight="900"
    fontSize="25"
    textAnchor="middle"
    fill="#ffffff"
  >
    V
  </text>
</svg>
